<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator - Step 4</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
<div class="container">
    <h1 class="mt-4 mb-4">GPA Calculator</h1>

    <!-- Student Info Card -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Student Information</h5>
            <div class="form-row">
                <div class="col">
                    <input type="text" id="studentName" class="form-control" placeholder="Student Name" required>
                </div>
                <div class="col">
                    <input type="text" id="semester" class="form-control" placeholder="Semester (e.g. S1 2026)" required>
                </div>
            </div>
        </div>
    </div>

    <!-- Result -->
    <div id="result" class="mt-3"></div>

    <!-- Progress Bar -->
    <div id="progressSection" style="display:none;" class="mb-4">
        <label>GPA Progress (0 - 4)</label>
        <div class="progress" style="height:30px;">
            <div id="progressBar" class="progress-bar" role="progressbar"
                 style="width:0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="4">
            </div>
        </div>
    </div>

    <!-- Form -->
    <form id="gpaForm" class="mt-3">
        <div id="courses">
            <div class="course-row form-row mb-2">
                <div class="col">
                    <input type="text" name="course[]" class="form-control"
                           placeholder="Course name" required>
                </div>
                <div class="col-2">
                    <input type="number" name="credits[]" class="form-control"
                           placeholder="Credits" min="1" required>
                </div>
                <div class="col-2">
                    <select name="grade[]" class="form-control">
                        <option value="4.0">A</option>
                        <option value="3.0">B</option>
                        <option value="2.0">C</option>
                        <option value="1.0">D</option>
                        <option value="0.0">F</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="button" id="addCourse" class="btn btn-secondary mb-3">+ Add Course</button><br>
        <button type="submit" class="btn btn-primary">Calculate GPA</button>
        <button type="button" id="exportCSV" class="btn btn-success ml-2" style="display:none;">
            Export CSV
        </button>
    </form>

    <!-- Previous Records -->
    <div class="mt-5">
        <h4>Previous GPA Records</h4>
        <div id="previousRecords"></div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="infoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">GPA Info</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
